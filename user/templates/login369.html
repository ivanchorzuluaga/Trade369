{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Css -->
    <link rel="stylesheet" type="text/css" href="{% static 'css/login369.css' %}" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Document</title>
</head>

<body class="body_bg">
<div class="bg_cape"></div>
    <div class="row">

        <form action="#" method="POST">
            {% csrf_token %}
        <div class="col-xs-12 col-lg-5 d-flex justify-content-center align-items-center hv-100">
            <div class="form_container">
                <div class="d-flex justify-content-center align-items-center">
                    <div class="d-flex justify-content-center align-items-center mb-3">
                        
                        <img class="logo" src="{% static 'img/logo/369 TRADE23.png' %}">
                        
                    </div>
                </div>
                <p class="text-center colorPrimary">Ingresa los datos de Usuario</p>
                <div class="row">
                    <div class="col-lg-12 margin_container">
                        <label class="label_login" for="basic-url">Usuario</label>
                        <div class="input-group mb-3 mt-2">

                            <input type="text" class="form-control" aria-describedby="basic-addon3" id="username" name="username">
                        </div>
                    </div>
                    
                    <div class="col-lg-12 margin_container">
                        <label class="label_login" for="basic-url">Contraseña</label>
                        <div class="input-group mb-3 mt-2">

                            <input type="password" class="form-control" aria-describedby="basic-addon3" id="password" name="password">
                        </div>
                    </div>
                  
                </div>
                <div class="row">
                    <div class="col-lg-12 margin_container">
                        <div class="input-group input-group-sm">
                            <input type="checkbox" id="ProcessingConsultantYN" value="0" />
                            <label class="checkbox-inline colorPrimary label_checkbox_login">&nbsp;Recuérdame</label>
                        </div>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-lg-12 text-center">
                    <p class="error_message" style="color: #ffff; font-weight: 700; margin-bottom: 0px">{{error}}</p>
                </div>
                </div>
                <div class="row mt-4 mb-3">
                    <div class="col-lg-12 text-center margin_container">
                        <button type="submit" class="btn login_btn">Iniciar Sesión</button>
                    </div>
                    <div class="col-lg-12 mt-3 margin_container text-center">
                        <a href="https://api.whatsapp.com/send?phone=5493516342592&text=Hola!%20Me%20Olvide%20mi%20un%20Contraseña!"  target="_blank" class="label_login" for="basic-url">Recuperar contraseña</a>
                    </div>
                </div>
            </div>
        </div>
    </form>
          </div>
        </div>
    </div>






    <!-- Bootstrap Js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous">
        </script>
</body>

</html>
